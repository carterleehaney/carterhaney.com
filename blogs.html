<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carter Haney | Blogs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Courier New", monospace;
      }

      body {
        background-color: #0a0a0a;
        color: #00ff00;
        line-height: 1.6;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 800px;
        text-align: left;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        text-shadow: 0 0 10px #00ff00;
        text-align: center;
      }

      .blog-post {
        border: 2px solid #00ff00;
        padding: 1.5rem;
        margin-bottom: 2rem;
        border-radius: 5px;
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blogs</h1>
        <div id="blogs-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const blogsContainer = document.getElementById('blogs-container');
        const blogContentContainer = document.createElement('div');
        blogContentContainer.id = 'blog-content-container';
        
        const blogList = document.createElement('ul');
        blogList.id = 'blog-list';

        blogsContainer.appendChild(blogList);
        blogsContainer.appendChild(blogContentContainer);

        // This would ideally be a dynamic list of files from the server.
        // For now, we'll hardcode the list and sort it.
        const blogFiles = [
            '2025-06-27-example.md'
            // Add more blog files here as they are created
        ].sort().reverse();

        blogFiles.forEach(blogFile => {
            const listItem = document.createElement('li');
            const link = document.createElement('a');
            link.href = '#';
            link.textContent = blogFile.replace('.md', '').replace(/\d{4}-\d{2}-\d{2}-/, '');
            link.onclick = (e) => {
                e.preventDefault();
                fetch(blogFile)
                    .then(response => response.text())
                    .then(text => {
                        blogContentContainer.innerHTML = marked(text);
                    });
            };
            listItem.appendChild(link);
            blogList.appendChild(listItem);
        });
    </script>
</body>
</html>
