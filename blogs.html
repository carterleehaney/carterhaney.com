<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carter Haney | Blogs</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Courier New", monospace;
      }

      body {
        background-color: #0a0a0a;
        color: #00ff00;
        line-height: 1.6;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 800px;
        width: 100%;
        text-align: left;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        text-shadow: 0 0 10px #00ff00;
        text-align: center;
      }
      
      .button {
        padding: 0.8rem 1.5rem;
        background-color: transparent;
        border: 2px solid #00ff00;
        color: #00ff00;
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 1rem;
        border-radius: 5px;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .button:hover {
        background-color: #00ff00;
        color: #0a0a0a;
        box-shadow: 0 0 15px #00ff00;
      }

      #blogs-container ul {
        list-style: none;
        padding: 0;
        margin-bottom: 2rem;
      }
      
      #blogs-container ul li {
        margin-bottom: 1rem;
      }
      
      #blogs-container ul li a {
        color: #00ff00;
        text-decoration: none;
        font-size: 1.2rem;
      }
      
      #blogs-container ul li a:hover {
        text-decoration: underline;
      }
      
      #blog-content-container {
        border: 2px solid #00ff00;
        padding: 1.5rem;
        border-radius: 5px;
        background-color: #0c0c0c;
      }

      #blog-content-container h1,
      #blog-content-container h2,
      #blog-content-container h3 {
        text-align: left;
        margin-top: 1rem;
        margin-bottom: 1rem;
      }

      #blog-content-container p {
        margin-bottom: 1rem;
      }

      #blog-content-container a {
        color: #00ff00;
      }

      #blog-content-container a:hover {
        text-decoration: underline;
      }

      #blog-content-container code {
        background-color: #1a1a1a;
        padding: 0.2rem 0.4rem;
        border-radius: 3px;
        font-family: "Courier New", monospace;
      }

      #blog-content-container pre {
        background-color: #1a1a1a;
        padding: 1rem;
        border-radius: 5px;
        overflow-x: auto;
      }

    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="button" style="margin-bottom: 2rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Home
        </a>
        <h1 id="main-title">Blogs</h1>
        <div id="blogs-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const blogsContainer = document.getElementById('blogs-container');
        const blogContentContainer = document.createElement('div');
        blogContentContainer.id = 'blog-content-container';
        blogContentContainer.style.display = 'none';
        
        const blogList = document.createElement('ul');
        blogList.id = 'blog-list';

        blogsContainer.appendChild(blogList);
        blogsContainer.appendChild(blogContentContainer);

        const mainTitle = document.getElementById('main-title');

        const blogFiles = [
            '2025-06-27-example.md'
        ].sort().reverse();

        blogFiles.forEach(blogFile => {
            const listItem = document.createElement('li');
            const link = document.createElement('a');
            link.href = '#';
            const blogTitle = blogFile.replace('.md', '').replace(/\d{4}-\d{2}-\d{2}-/, '');
            link.textContent = blogTitle;
            link.onclick = (e) => {
                e.preventDefault();
                fetch(blogFile)
                    .then(response => response.text())
                    .then(text => {
                        mainTitle.style.display = 'none';
                        blogList.style.display = 'none';
                        blogContentContainer.innerHTML = marked.parse(text);
                        blogContentContainer.style.display = 'block';
                    });
            };
            listItem.appendChild(link);
            blogList.appendChild(listItem);
        });
    </script>
</body>
</html>
